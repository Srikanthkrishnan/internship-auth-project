<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="container">
    <div class="card-box">

        <h2 class="text-center mb-4">Profile</h2>

        <input type="number" id="age" class="form-control mb-3" placeholder="Age">

        <input type="date" id="dob" class="form-control mb-3">

        <input type="text" id="contact" class="form-control mb-3" placeholder="Contact">

        <button id="saveProfileBtn" class="btn btn-primary w-100">
            Save Profile
        </button>

        <button id="logoutBtn" class="btn btn-danger w-100 mt-3">
            Logout
        </button>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/js/profile.js"></script>

</body>
</html>
